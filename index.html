const $ = id => document.getElementById(id)
const APP = () => $('app')

function isLocked(match) {
  return new Date() >= new Date(match.dt)
}

function fmtTime(iso) {
  return new Date(iso).toLocaleString('pt-BR', {
    timeZone:'America/Sao_Paulo', hour:'2-digit', minute:'2-digit'
  })
}

function fmtDay(iso) {
  return new Date(iso).toLocaleString('pt-BR', {
    timeZone:'America/Sao_Paulo',
    weekday:'long', day:'2-digit', month:'long'
  })
}

function fmtFull(iso) {
  return new Date(iso).toLocaleString('pt-BR', {
    timeZone:'America/Sao_Paulo',
    weekday:'short', day:'2-digit', month:'2-digit',
    hour:'2-digit', minute:'2-digit'
  })
}

function outcome(h, a) {
  return h > a ? 1 : h < a ? -1 : 0
}

function calcPoints(predH, predA, realH, realA) {
  if (predH === realH && predA === realA) return 3
  if (outcome(predH, predA) === outcome(realH, realA)) return 1
  return 0
}

function groupColor(g) {
  const map = {
    A:'bg-red-900 text-red-300', B:'bg-orange-900 text-orange-300',
    C:'bg-yellow-900 text-yellow-300', D:'bg-green-900 text-green-300',
    E:'bg-teal-900 text-teal-300', F:'bg-cyan-900 text-cyan-300',
    G:'bg-blue-900 text-blue-300', H:'bg-indigo-900 text-indigo-300',
    I:'bg-violet-900 text-violet-300', J:'bg-purple-900 text-purple-300',
    K:'bg-pink-900 text-pink-300', L:'bg-rose-900 text-rose-300',
  }
  return map[g] || 'bg-slate-800 text-slate-400'
}

function toast(msg, type='info') {
  const colors = {success:'bg-green-700 border-green-500', error:'bg-red-700 border-red-500',
                  info:'bg-blue-700 border-blue-500', warning:'bg-yellow-600 border-yellow-400'}
  const icons  = {success:'✓', error:'✕', info:'ℹ', warning:'⚠'}
  const el = document.createElement('div')
  el.className = `toast-in flex items-center gap-3 px-4 py-3 rounded-xl border text-white text-sm font-medium shadow-2xl pointer-events-auto ${colors[type]}`
  el.innerHTML = `<span class="text-lg font-bold">${icons[type]}</span><span>${msg}</span>`
  $('toasts').appendChild(el)
  setTimeout(() => { el.style.cssText='opacity:0;transition:opacity .3s'; setTimeout(()=>el.remove(),300) }, 3500)
}

function spin() { return '<div class="spin mx-auto"></div>' }

function removeChannels() {
  STATE.realtimeSubs.forEach(ch => sb.removeChannel(ch))
  STATE.realtimeSubs = []
}

// ═══════════════════════════════════════════════════════════════
//  ROUTER
// ═══════════════════════════════════════════════════════════════
async function go(page) {
  removeChannels()
  STATE.page = page
  APP().innerHTML = `<div class="flex items-center justify-center min-h-screen">${spin()}</div>`

  if (page === 'login' || page === 'register') {
    APP().innerHTML = pageAuth(page)
    bindAuth(page)
    return
  }

  // Require auth
  if (!STATE.user) {
    const session = loadSession()
    if (!session) { go('login'); return }
    STATE.user = session
    STATE.profile = session
  }

  const isAdmin = STATE.profile?.is_admin || false
  const uname = STATE.profile?.username || STATE.user.email?.split('@')[0] || 'Usuário'

  let body = ''
  if (page === 'dashboard') {
    await loadUserPredictions()
    await loadDbMatches()
    body = pageDashboard()
  } else if (page === 'ranking') {
    // Carrega bolões do usuário antes de renderizar
    const { data: mem } = await sb.from('bolao_members')
      .select('bolao_id, bolaos(id, name)').eq('user_id', STATE.user.id)
    STATE.myBolaos = (mem || []).map(m => m.bolaos).filter(Boolean)
    body = `<div id="rank-wrap" class="max-w-3xl mx-auto px-4 py-6">${spin()}</div>`
  } else if (page === 'results') {
    await loadDbMatches()
    body = pageResults()
  } else if (page === 'bolaos') {
    body = await pageBolaos()
  } else if (page === 'mypicks') {
    body = await pageMyPicks()
  } else if (page === 'admin') {
    body = await pageAdmin()
  }

  APP().innerHTML = header(page, uname, isAdmin) + `<main class="pt-14">${body}</main>`
  bindHeader()

  if (page === 'dashboard') bindDashboard()
  if (page === 'ranking')   loadRanking()
  if (page === 'admin')     bindAdmin()
}

async function loadProfile() {
  const { data } = await sb.from('profiles')
    .select('id,username,total_points,is_admin')
    .eq('id', STATE.user.id).single()
  if (data) { STATE.profile = data; STATE.user = data; saveSession(data) }
}

async function loadUserPredictions() {
  const { data } = await sb.from('predictions').select('*').eq('user_id', STATE.user.id)
  STATE.predictions = {}
  if (data) data.forEach(p => { STATE.predictions[p.match_id] = p })
}

async function loadDbMatches() {
  const { data } = await sb.from('matches').select('id,home_score,away_score,status')
  STATE.dbMatches = {}
  if (data) data.forEach(m => { STATE.dbMatches[m.id] = m })
}

function bindAuth(mode) {
  window.go = go

}

async function handleLogin(e) {
  e.preventDefault()
  const btn = $('auth-btn'), err = $('auth-err')
  btn.disabled = true; btn.textContent = 'Entrando...'
  err.classList.add('hidden')

  const username = $('f-user').value.trim()
  const password = $('f-pass').value

  const { data: profile, error: profileErr } = await sb
    .from('profiles')
    .select('id, username, is_admin, total_points')
    .eq('username', username)
    .eq('senha', password)
    .maybeSingle()

  if (profileErr || !profile) {
    err.textContent = 'Usuário ou senha incorretos.'
    err.classList.remove('hidden')
    btn.disabled = false; btn.textContent = 'Entrar'
    return
  }

  STATE.user = profile
  STATE.profile = profile
  saveSession(profile)
  toast('Bem-vindo, ' + username + '! ⚽', 'success')
  go('dashboard')
}

async function handleRegister(e) {
  e.preventDefault()
  const btn = $('auth-btn'), err = $('auth-err')
  const username = $('f-user').value.trim()
  const pass     = $('f-pass').value

  if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
    err.textContent = 'Nome de usuário: 3-20 caracteres (letras, números, _)'
    err.classList.remove('hidden'); return
  }
  if (!pass) {
    err.textContent = 'Digite uma senha.'
    err.classList.remove('hidden'); return
  }

  btn.disabled = true; btn.textContent = 'Cadastrando...'
  err.classList.add('hidden')

  const { data: ex } = await sb.from('profiles').select('id').eq('username', username).maybeSingle()
  if (ex) {
    err.textContent = 'Nome de usuário já em uso.'
    err.classList.remove('hidden')
    btn.disabled = false; btn.textContent = 'Criar conta'; return
  }

  // Gera UUID no cliente e insere direto na tabela profiles
  const newId = crypto.randomUUID()
  const { error } = await sb.from('profiles').insert({
    id: newId, username, senha: pass, total_points: 0, is_admin: false
  })
  if (error) {
    err.textContent = 'Erro ao criar conta: ' + error.message
    err.classList.remove('hidden')
    btn.disabled = false; btn.textContent = 'Criar conta'; return
  }

  const profile = { id: newId, username, is_admin: false, total_points: 0 }
  STATE.user = profile
  STATE.profile = profile
  saveSession(profile)
  toast('Conta criada! Bem-vindo! 🎉', 'success')
  go('dashboard')
}

function pageDashboard() {
  return `
  <div class="max-w-3xl mx-auto px-4 py-6">
    <!-- Toggle -->
    <div class="flex gap-2 mb-5 bg-card border border-border rounded-xl p-1">
      <button id="btn-rodada" onclick="setView('rodada')"
        class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${STATE.dashView==='rodada'?'bg-gold text-night':'text-slate-400 hover:text-white'}">
        Por Rodada
      </button>
      <button id="btn-grupo" onclick="setView('grupo')"
        class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${STATE.dashView==='grupo'?'bg-gold text-night':'text-slate-400 hover:text-white'}">
        Por Grupo
      </button>
    </div>
    <!-- Pills -->
    <div id="pills" class="flex gap-2 overflow-x-auto pb-2 mb-5 no-scrollbar">${buildPills()}</div>
    <!-- Matches -->
    <div id="match-list">${buildMatchList()}</div>
  </div>`
}

function buildPills() {
  if (STATE.dashView === 'rodada') {
    return [1,2,3].map(r => `
      <button onclick="setFilter(${r})"
        class="flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-semibold border transition-all
          ${STATE.dashFilter===r?'bg-gold border-gold text-night':'border-border text-slate-400 hover:border-gold hover:text-gold'}">
        Rodada ${r}
      </button>`).join('')
  }
  return GROUPS.map(g => `
    <button onclick="setFilter('${g}')"
      class="flex-shrink-0 w-9 h-9 rounded-full text-sm font-bold border transition-all
        ${STATE.dashFilter===g?'bg-gold border-gold text-night':'border-border text-slate-400 hover:border-gold hover:text-gold'}">
      ${g}
    </button>`).join('')
}

function buildMatchList() {
  let matches = STATE.dashView === 'rodada'
    ? MATCHES.filter(m => m.round === STATE.dashFilter).sort((a,b) => new Date(a.dt)-new Date(b.dt))
    : MATCHES.filter(m => m.group === STATE.dashFilter).sort((a,b) => a.round-b.round || new Date(a.dt)-new Date(b.dt))

  if (!matches.length) return '<p class="text-slate-500 text-center py-8">Nenhum jogo encontrado.</p>'

  const ps = STATE.dashPageSize
  const totalPages = Math.ceil(matches.length / ps)
  if (STATE.dashPage >= totalPages) STATE.dashPage = 0
  const page = STATE.dashPage
  const slice = matches.slice(page * ps, (page + 1) * ps)

  // Group by day
  const byDay = {}
  slice.forEach(m => {
    const d = fmtDay(m.dt)
    if (!byDay[d]) byDay[d] = []
    byDay[d].push(m)
  })

  const cards = Object.entries(byDay).map(([day, list]) => `
    <div class="mb-4">
      <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 px-1 capitalize">${day}</h3>
      <div class="flex flex-col gap-3">${list.map(m => buildCard(m)).join('')}</div>
    </div>`).join('')

  const pagination = totalPages > 1 ? `
    <div class="flex items-center justify-center gap-3 mt-6 mb-2">
      <button onclick="setDashPage(${page-1})" ${page===0?'disabled':''} class="btn btn-dark btn-sm">← Anterior</button>
      <span class="text-xs text-slate-500 font-semibold px-2">${page+1} / ${totalPages}</span>
      <button onclick="setDashPage(${page+1})" ${page===totalPages-1?'disabled':''} class="btn btn-dark btn-sm">Próximo →</button>
    </div>` : ''

  return cards + pagination
}

function buildCard(match) {
  const dbM   = STATE.dbMatches[match.id] || {}
  const pred  = STATE.predictions[match.id]
  const home  = TEAMS[match.home]
  const away  = TEAMS[match.away]
  const locked = isLocked(match)
  const hasResult = dbM.home_score != null && dbM.away_score != null

  // Status badge
  let statusBadge = ''
  if (hasResult) {
    statusBadge = '<span class="text-xs bg-green-900 text-green-400 font-bold px-2 py-0.5 rounded-full">Encerrado</span>'
  } else if (locked) {
    statusBadge = '<div class="flex items-center gap-1.5"><div class="dot"></div><span class="text-xs font-bold text-green-400">Ao vivo</span></div>'
  }

  // Points badge
  let ptsBadge = ''
  if (pred && hasResult) {
    const pts = calcPoints(pred.home_score, pred.away_score, dbM.home_score, dbM.away_score)
    ptsBadge = pts===3
      ? '<span class="badge-3 text-white text-xs font-black px-2.5 py-0.5 rounded-full">🎯 +3</span>'
      : pts===1
      ? '<span class="badge-1 text-white text-xs font-black px-2.5 py-0.5 rounded-full">✓ +1</span>'
      : '<span class="badge-0 text-white text-xs font-black px-2.5 py-0.5 rounded-full">✕ 0</span>'
  }

  // Center content
  let center = ''
  if (hasResult) {
    center = `
      <div class="flex items-center gap-2">
        <span class="text-3xl font-black text-white w-8 text-center">${dbM.home_score}</span>
        <span class="text-slate-500 font-bold">×</span>
        <span class="text-3xl font-black text-white w-8 text-center">${dbM.away_score}</span>
      </div>
      ${pred ? `<div class="text-xs text-slate-500 mt-1">Seu palpite: ${pred.home_score}×${pred.away_score}</div>` : ''}`
  } else if (pred) {
    center = `
      <div class="flex items-center gap-2">
        <span class="text-2xl font-black text-gold w-8 text-center">${pred.home_score}</span>
        <span class="text-slate-500 font-bold">×</span>
        <span class="text-2xl font-black text-gold w-8 text-center">${pred.away_score}</span>
      </div>
      <div class="text-xs ${locked?'text-yellow-500':'text-green-400'} mt-1 font-semibold">${locked?'🔒 Bloqueado':'✓ Salvo'}</div>`
  } else if (locked) {
    center = `<div class="text-2xl font-black text-slate-600">— × —</div><div class="text-xs text-slate-600 mt-1">Bloqueado</div>`
  } else {
    center = `
      <div class="flex items-center gap-2">

function bindDashboard() {
  window.setView = (v) => {
    STATE.dashView = v
    STATE.dashFilter = v==='rodada' ? 1 : 'A'
    STATE.dashPage = 0
    $('btn-rodada').className = `flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${v==='rodada'?'bg-gold text-night':'text-slate-400 hover:text-white'}`
    $('btn-grupo').className  = `flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${v==='grupo'?'bg-gold text-night':'text-slate-400 hover:text-white'}`
    $('pills').innerHTML = buildPills()
    $('match-list').innerHTML = buildMatchList()
    bindInputs()
  }

  window.setFilter = (f) => {
    STATE.dashFilter = f
    STATE.dashPage = 0
    $('pills').innerHTML = buildPills()
    $('match-list').innerHTML = buildMatchList()
    bindInputs()
  }

  window.setDashPage = (p) => {
    STATE.dashPage = p
    $('match-list').innerHTML = buildMatchList()
    bindInputs()
    window.scrollTo({ top: 0, behavior: 'smooth' })
  }

  window.savePred = async (matchId) => {
    const match = MATCHES.find(m => m.id === matchId)
    if (!match || isLocked(match)) { toast('Jogo bloqueado!', 'warning'); return }
    if (STATE.predictions[matchId]) { toast('Palpite já registrado!', 'warning'); return }

    const hEl = $(`h${matchId}`), aEl = $(`a${matchId}`)
    if (!hEl || !aEl) return

    const hv = parseInt(hEl.value), av = parseInt(aEl.value)
    if (isNaN(hv) || isNaN(av) || hv < 0 || av < 0) { toast('Preencha os dois placares!', 'error'); return }

    const { error } = await sb.from('predictions').insert({
      user_id: STATE.user.id, match_id: matchId, home_score: hv, away_score: av
    })

    if (error) {
      toast(error.code==='23505' ? 'Palpite já registrado!' : 'Erro: ' + error.message, 'error')
      return
    }
    STATE.predictions[matchId] = { match_id: matchId, home_score: hv, away_score: av, points: null }
    toast('Palpite salvo! 🎯', 'success')
    $('match-list').innerHTML = buildMatchList()
    bindInputs()
  }

  // Realtime: match results
  const ch = sb.channel('dash-matches')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'matches' }, (p) => {
      const u = p.new
      STATE.dbMatches[u.id] = u
      $('match-list').innerHTML = buildMatchList()
      bindInputs()
    })
    .subscribe()
  STATE.realtimeSubs.push(ch)

  bindInputs()
}

function bindInputs() {
  document.querySelectorAll('input[type=number]').forEach(inp => {
    inp.addEventListener('input', () => {
      let v = parseInt(inp.value)
      if (isNaN(v) || v < 0) inp.value = ''
      else if (v > 99) inp.value = 99
    })
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const id = parseInt(inp.id.replace(/^[ha]/,''))
        window.savePred && window.savePred(id)
      }
    })
  })
}

async function createBolao() {
  const name = $('new-bolao-name')?.value.trim()
  if (!name) { toast('Digite um nome para o bolão.', 'error'); return }

  const uid = STATE.user.id
  const code = Math.random().toString(36).substring(2,6).toUpperCase() + Math.random().toString(36).substring(2,6).toUpperCase()

  const { data: b, error } = await sb.from('bolaos')
    .insert({ name, owner_id: uid, invite_code: code.substring(0,8) })
    .select().single()
  if (error) { toast('Erro: ' + error.message, 'error'); return }

  await sb.from('bolao_members').insert({ bolao_id: b.id, user_id: uid })
  toast('Bolão "' + name + '" criado! 🎱', 'success')
  go('bolaos')
}

async function joinBolao() {
  const code = $('join-code')?.value.trim().toUpperCase()
  if (!code) { toast('Digite o código do bolão.', 'error'); return }

  const { data: b, error } = await sb.from('bolaos').select('*').eq('invite_code', code).maybeSingle()
  if (error || !b) { toast('Código não encontrado.', 'error'); return }

  const uid = STATE.user.id
  const { data: already } = await sb.from('bolao_members').select('bolao_id').eq('bolao_id', b.id).eq('user_id', uid).maybeSingle()
  if (already) { toast('Você já está neste bolão!', 'warning'); return }

  const { error: e2 } = await sb.from('bolao_members').insert({ bolao_id: b.id, user_id: uid })
  if (e2) { toast('Erro ao entrar: ' + e2.message, 'error'); return }

  toast('Entrou no bolão "' + b.name + '"! 🎉', 'success')
  selectBolao(b.id, b.name)
}

function selectBolao(id, name) {
  STATE.currentBolao = id ? { id, name } : null
  go('ranking')
}

async function deleteBolao(id) {
  await sb.from('bolaos').delete().eq('id', id)
  if (STATE.currentBolao?.id === id) STATE.currentBolao = null
  toast('Bolão excluído.', 'success')
  go('bolaos')
}

async function leaveBolao(id) {
  await sb.from('bolao_members').delete().eq('bolao_id', id).eq('user_id', STATE.user.id)
  if (STATE.currentBolao?.id === id) STATE.currentBolao = null
  toast('Você saiu do bolão.', 'success')
  go('bolaos')
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => toast('Código copiado: ' + code, 'success'))
}

async function loadRanking() {
  const wrap = $('rank-wrap')
  if (!wrap) return

  // Se bolão ativo, busca apenas membros dele
  let profileIds = null
  if (STATE.currentBolao) {
    const { data: members } = await sb.from('bolao_members')
      .select('user_id').eq('bolao_id', STATE.currentBolao.id)
    profileIds = (members || []).map(m => m.user_id)
  }

  // IDs dos jogos da rodada filtrada
  const roundMatchIds = STATE.rankRound
    ? new Set(MATCHES.filter(m => m.round === STATE.rankRound).map(m => m.id))
    : null

  // Busca predições (com match_id para filtrar por rodada se necessário)
  const { data: preds } = await sb.from('predictions').select('user_id,match_id,points')
  const roundPoints = {}  // pontos por usuário na rodada filtrada
  const counts = {}
  if (preds) preds.forEach(p => {
    const inRound = !roundMatchIds || roundMatchIds.has(p.match_id)
    if (!counts[p.user_id]) counts[p.user_id] = { total:0, exact:0, partial:0 }
    if (inRound) {
      counts[p.user_id].total++
      if (p.points===3) counts[p.user_id].exact++
      else if (p.points===1) counts[p.user_id].partial++
      roundPoints[p.user_id] = (roundPoints[p.user_id]||0) + (p.points||0)
    }
  })

  // Se filtro por rodada, ordenar pelo somatório da rodada
  let query = sb.from('profiles').select('id,username,total_points').limit(200)
  if (profileIds) query = query.in('id', profileIds.length ? profileIds : ['00000000-0000-0000-0000-000000000000'])
  const { data: rawData } = await query

  let data = rawData
  if (STATE.rankRound && data) {
    data = [...data].sort((a,b) => (roundPoints[b.id]||0) - (roundPoints[a.id]||0))
  } else if (data) {
    data = [...data].sort((a,b) => b.total_points - a.total_points)
  }

  const rows = !data?.length
    ? '<div class="text-center py-16"><div class="text-5xl mb-4">🏆</div><p class="text-slate-400">Nenhum participante ainda.</p></div>'
    : data.map((u,i) => {
        const pts = STATE.rankRound ? (roundPoints[u.id]||0) : u.total_points
        const rank = i+1
        const isMe = u.id === STATE.user?.id
        const c = counts[u.id] || { total:0, exact:0, partial:0 }
        const medal = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':`<span class="text-sm font-bold text-slate-500">${rank}°</span>`
        return `
        <div class="flex items-center gap-3 px-4 py-3 rounded-2xl border transition-all
          ${isMe ? 'bg-gold/10 border-gold/40 glow' : 'bg-card border-border hover:border-slate-600'}">
          <div class="w-10 flex items-center justify-center text-2xl">${medal}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-bold text-sm text-white truncate">${u.username}</span>
              ${isMe ? '<span class="text-xs bg-gold/20 text-gold px-2 py-0.5 rounded-full font-semibold flex-shrink-0">Você</span>' : ''}
            </div>
            <div class="flex items-center gap-3 mt-0.5 text-xs text-slate-500">
              <span>${c.total} palpite${c.total!==1?'s':''}</span>
              ${c.exact>0?`<span class="text-yellow-500">🎯 ${c.exact}</span>`:''}
              ${c.partial>0?`<span class="text-blue-400">✓ ${c.partial}</span>`:''}
            </div>
          </div>
          <div class="text-right flex-shrink-0">
            <div class="text-2xl font-black ${isMe?'text-gold':'text-white'}">${pts}</div>
            <div class="text-xs text-slate-500">${STATE.rankRound ? 'pts R'+STATE.rankRound : 'pts total'}</div>
          </div>
        </div>`
      }).join('')

  // Seletor de bolões
  const allOptions = [
    { id: null, name: '🌐 Geral' },
    ...STATE.myBolaos.map(b => ({ id: b.id, name: '🎱 ' + b.name }))
  ]
  const bolaoSelector = allOptions.length > 1 ? `
    <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
      ${allOptions.map(opt => {
        const active = (STATE.currentBolao?.id || null) === opt.id
        return `<button onclick="switchRanking('${opt.id}','${opt.name.replace(/'/g,"\\'")}')"
          class="flex-shrink-0 px-4 py-2 rounded-full text-sm font-bold border transition-all
            ${active ? 'bg-gold border-gold text-night' : 'border-border text-slate-400 hover:border-gold hover:text-gold'}">
          ${opt.name}</button>`
      }).join('')}
    </div>` : ''

  // Filtro por rodada
  const roundFilter = `
    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
      ${[null,1,2,3].map(r => {
        const active = STATE.rankRound === r
        const label = r === null ? 'Todas rodadas' : 'Rodada ' + r
        return `<button onclick="switchRankRound(${r})"
          class="flex-shrink-0 px-4 py-2 rounded-full text-sm font-bold border transition-all
            ${active ? 'bg-navy border-gold text-gold' : 'border-border text-slate-500 hover:border-slate-400 hover:text-slate-300'}">
          ${label}</button>`
      }).join('')}
    </div>`

  const title = STATE.currentBolao ? STATE.currentBolao.name : 'Ranking Geral'
  const subtitle = STATE.rankRound ? `Rodada ${STATE.rankRound} · ${data?.length||0} participantes` : `${data?.length||0} participantes · atualizado em tempo real`
  const icon  = STATE.currentBolao ? '🎱' : '🏆'

  wrap.innerHTML = `
    <div class="flex flex-col gap-2 mb-5">
      ${bolaoSelector}
      ${roundFilter}
    </div>
    <div class="bg-gradient-to-r from-gold/20 to-yellow-900/20 border border-gold/30 rounded-2xl p-5 mb-5 text-center">
      <div class="text-4xl mb-2">${icon}</div>
      <h2 class="text-xl font-black text-white">${title}</h2>
      <p class="text-xs text-slate-400 mt-1">${subtitle}</p>
    </div>
    <div class="flex items-center gap-4 mb-4 px-1 text-xs text-slate-500">
      <span class="flex items-center gap-1"><span class="badge-3 rounded px-1.5 py-0.5 text-white font-bold">3pts</span> Exato</span>
      <span class="flex items-center gap-1"><span class="badge-1 rounded px-1.5 py-0.5 text-white font-bold">1pt</span> Resultado</span>
      <span class="flex items-center gap-1"><span class="badge-0 rounded px-1.5 py-0.5 text-white font-bold">0pts</span> Errou</span>
    </div>
    <div class="flex flex-col gap-2">${rows}</div>`

  window.switchRanking = (id, name) => {
    STATE.currentBolao = id && id !== 'null' ? { id, name: name.replace(/^🎱 /,'') } : null
    $('rank-wrap').innerHTML = spin()
    loadRanking()
  }

  window.switchRankRound = (r) => {
    STATE.rankRound = r
    $('rank-wrap').innerHTML = spin()
    loadRanking()
  }

  const ch = sb.channel('ranking-rt-' + (STATE.currentBolao?.id||'geral'))
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'profiles' }, () => loadRanking())
    .subscribe()
  STATE.realtimeSubs.push(ch)
}

    const pts = calcPoints(p.home_score, p.away_score, dbM.home_score, dbM.away_score)

          <div class="text-xs text-slate-400">pontos</div>
        </div>
      </div>
      <div class="grid grid-cols-4 gap-2 text-center">
        <div class="bg-navy rounded-xl p-2"><div class="text-xl font-black text-white">${total}</div><div class="text-xs text-slate-400">palpites</div></div>
        <div class="bg-yellow-900/30 rounded-xl p-2"><div class="text-xl font-black text-yellow-400">${exact}</div><div class="text-xs text-slate-400">cravados</div></div>
        <div class="bg-blue-900/30 rounded-xl p-2"><div class="text-xl font-black text-blue-400">${partial}</div><div class="text-xs text-slate-400">acertos</div></div>
        <div class="bg-slate-800/50 rounded-xl p-2"><div class="text-xl font-black text-slate-400">${pending}</div><div class="text-xs text-slate-400">pendentes</div></div>
      </div>
    </div>
    ${total===0
      ? '<div class="text-center py-16"><div class="text-5xl mb-4">⚽</div><p class="text-slate-400">Ainda sem palpites. Vá para "Jogos"!</p></div>'
      : `<div class="flex flex-col gap-3">${rows}</div>`}
  </div>`
}

// ═══════════════════════════════════════════════════════════════
//  ADMIN
// ═══════════════════════════════════════════════════════════════
async function pageAdmin() {
  const { data: prof } = await sb.from('profiles').select('is_admin').eq('id', STATE.user.id).single()
  if (!prof?.is_admin) {
    return `<div class="max-w-3xl mx-auto px-4 py-16 text-center">
      <div class="text-5xl mb-4">🔒</div>
      <h2 class="text-xl font-bold text-white mb-2">Acesso Restrito</h2>
      <p class="text-slate-400">Apenas administradores podem inserir resultados.</p>
    </div>`
  }

  await loadDbMatches()

  const cards = MATCHES.map(m => {
    const home = TEAMS[m.home], away = TEAMS[m.away]
    const dbM = STATE.dbMatches[m.id] || {}
    const hasResult = dbM.home_score != null
    const locked = isLocked(m)

    return `
    <div class="bg-card border border-border rounded-2xl p-4" id="admin-card-${m.id}">
      <div class="flex items-center justify-between mb-3 text-xs">
        <span class="text-slate-400 font-bold">Grupo ${m.group} · R${m.round}</span>
        <div class="flex items-center gap-2">
          ${hasResult ? '<span class="bg-green-900 text-green-400 px-2 py-0.5 rounded-full font-bold">✓ Salvo</span>' : ''}
          <span class="text-slate-500">${fmtFull(m.dt)}</span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex-1 flex items-center gap-2 min-w-0">
          <span class="text-xl">${home.flag}</span>
          <span class="text-sm font-semibold text-white truncate">${home.name}</span>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <input type="number" min="0" max="99" id="ah${m.id}" value="${hasResult?dbM.home_score:''}" placeholder="0"
            ${!locked?'disabled':''} class="score-inp bg-navy border border-border rounded-lg px-2 py-1.5 text-lg font-black text-white
                focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold ${!locked?'opacity-40':''}" />
          <span class="text-slate-500 font-bold">×</span>
          <input type="number" min="0" max="99" id="aa${m.id}" value="${hasResult?dbM.away_score:''}" placeholder="0"
            ${!locked?'disabled':''} class="score-inp bg-navy border border-border rounded-lg px-2 py-1.5 text-lg font-black text-white
                focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold ${!locked?'opacity-40':''}" />
        </div>
        <div class="flex-1 flex items-center justify-end gap-2 min-w-0">
          <span class="text-sm font-semibold text-white truncate">${away.name}</span>
          <span class="text-xl">${away.flag}</span>
        </div>
      </div>
      ${locked
        ? `<button onclick="saveResult(${m.id})" id="admin-btn-${m.id}"
            class="mt-3 w-full bg-gold hover:bg-gold-dark text-night font-bold py-2 px-4 rounded-xl transition-colors text-sm">
            ${hasResult ? 'Atualizar' : 'Salvar resultado'}
          </button>`
        : `<p class="text-xs text-slate-600 mt-3 text-center">Disponível após o início do jogo</p>`}
    </div>`
  }).join('')

  return `
  <div class="max-w-3xl mx-auto px-4 py-6">
    <div class="bg-red-900/20 border border-red-700/40 rounded-2xl p-4 mb-4 flex items-center gap-3">
      <span class="text-2xl">⚙️</span>
      <div class="flex-1">
        <p class="font-bold text-red-300 text-sm">Painel do Administrador</p>
        <p class="text-xs text-slate-400">Insira os resultados manualmente ou busque da API automaticamente.</p>
      </div>
    </div>

    <!-- Botão buscar da API -->
    <div class="card p-4 mb-6">
      <p class="font-bold text-white text-sm mb-1">🌐 Buscar resultados via N8N</p>
      <p class="text-xs text-slate-400 mb-3">Cole a URL do Webhook do seu workflow N8N para buscar resultados automaticamente.</p>
      <div class="flex gap-2">
        <input id="n8n-webhook-url" class="input-field flex-1 font-mono text-xs"
          placeholder="https://n8n.jbrenno.cloud/webhook/buscar-resultados"
          value="${localStorage.getItem('n8n_webhook')||''}"/>
        <button onclick="fetchFromApi()" id="api-fetch-btn" class="btn btn-gold flex-shrink-0">Buscar agora</button>
      </div>
    </div>
    <div id="api-fetch-log" class="hidden card p-4 mb-6 text-xs font-mono text-slate-300 leading-relaxed"></div>

    <div class="flex flex-col gap-4">${cards}</div>
  </div>`
}

function bindAdmin() {
  window.fetchFromApi = async () => {
    const btn = $('api-fetch-btn')
    const log = $('api-fetch-log')
    btn.disabled = true; btn.textContent = 'Buscando...'
    log.classList.remove('hidden'); log.innerHTML = '⏳ Consultando football-data.org...'

    const MAP = {
      'MEX':'MEX','RSA':'RSA','KOR':'KOR','CZE':'CZE','CAN':'CAN',
      'BIH':'BIH','QAT':'QAT','SUI':'SUI','BRA':'BRA','MAR':'MAR',
      'HAI':'HAI','SCO':'SCO','USA':'USA','PAR':'PAR','AUS':'AUS',
      'TUR':'TUR','GER':'GER','CUW':'CUW','CIV':'CIV','ECU':'ECU',
      'NED':'NED','JPN':'JPN','SWE':'SWE','TUN':'TUN','ESP':'ESP',
      'CPV':'CPV','SAU':'KSA','URU':'URU','BEL':'BEL','EGY':'EGY',
      'IRN':'IRN','NZL':'NZL','FRA':'FRA','SEN':'SEN','IRQ':'IRQ',
      'NOR':'NOR','ARG':'ARG','ALG':'ALG','AUT':'AUT','JOR':'JOR',
      'POR':'POR','COD':'COD','ENG':'ENG','CRO':'CRO','GHA':'GHA',
      'PAN':'PAN','UZB':'UZB','COL':'COL','KSA':'KSA','DZA':'ALG'
    }

    const webhookUrl = $('n8n-webhook-url')?.value.trim()
    if (!webhookUrl) {
      log.innerHTML = '❌ Cole a URL do webhook do N8N acima.'
      btn.disabled = false; btn.textContent = 'Buscar agora'; return
    }

    // Dispara o workflow N8N via webhook e aguarda a resposta com os jogos
    let res
    try {
      res = await fetch(webhookUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
    } catch(e) {
      log.innerHTML = '❌ Não foi possível conectar ao N8N: ' + e.message
      btn.disabled = false; btn.textContent = 'Buscar agora'; return
    }

    if (!res.ok) {
      log.innerHTML = `❌ N8N retornou ${res.status}. Verifique se o workflow está ativo.`
      btn.disabled = false; btn.textContent = 'Buscar agora'; return
    }

    localStorage.setItem('n8n_webhook', webhookUrl)
    log.innerHTML = '✅ Workflow N8N disparado! Atualizando dados...'
    await new Promise(r => setTimeout(r, 3000)) // aguarda N8N processar
    await loadDbMatches()
    const total = Object.values(STATE.dbMatches).filter(m => m.home_score != null).length
    log.innerHTML = `✅ N8N executou com sucesso.<br>Total de jogos com resultado no banco: <strong>${total}</strong>`
    btn.disabled = false; btn.textContent = 'Buscar agora'
  }

  window.saveResult = async (matchId) => {
    const hv = parseInt($(`ah${matchId}`)?.value)
    const av = parseInt($(`aa${matchId}`)?.value)
    if (isNaN(hv) || isNaN(av) || hv<0 || av<0) { toast('Preencha os dois placares!','error'); return }

    const btn = $(`admin-btn-${matchId}`)
    if (btn) { btn.disabled=true; btn.textContent='Salvando...' }

    // Update match
    const { error } = await sb.from('matches').upsert({
      id: matchId, home_score: hv, away_score: av, status: 'finished'
    })

    if (error) {
      toast('Erro: ' + error.message, 'error')
      if (btn) { btn.disabled=false; btn.textContent='Salvar resultado' }
      return
    }

    // Calculate points
    const { error: rpcErr } = await sb.rpc('calculate_points_for_match', {
      p_match_id: matchId, p_home_score: hv, p_away_score: av
    })

    if (rpcErr) toast('Resultado salvo. Erro ao calcular pontos: ' + rpcErr.message, 'warning')
    else toast('Resultado salvo e pontos calculados! ✓', 'success')

    STATE.dbMatches[matchId] = { id:matchId, home_score:hv, away_score:av, status:'finished' }
    if (btn) { btn.disabled=false; btn.textContent='Atualizar' }
  }
}
